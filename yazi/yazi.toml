[mgr]
show_hidden = true
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
linemode = "size"
sort_dir_first = true
show_symlink = true
scrolloff = 5


[preview]
wrap = "yes"
tab_size = 2
max_width = 800
max_height = 1000


[opener]
edit = [
  { run = 'nvim %s', block = true, desc = "Neovim" }
]

code = [
  { run = 'code %s', orphan = true, desc = "VS Code" },
]

image = [
  { run = 'open %s', orphan = true, desc = "Preview" },
]



[open]
prepend_rules = [
   # folders first
  { name = "*/", use = "open" },

 
  { url = "*.ts", use = [ "edit", "code" ] },
  { url = "*.js", use = [ "edit", "code" ] },
  { url = "*.tsx", use = [ "edit", "code" ] },
  { url = "*.jsx", use = [ "edit", "code" ] },
  { url = "*.css",  use = [ "edit", "code" ] },
  { url = "*.scss", use = [ "edit", "code" ] },
  { url = "*.html", use = [ "browser", "edit" ] },


     # config / docs/ scripts
  # { url = "*.md", use = "edit" },
  # { url = "*.lua", use = "edit" },
  # { url = "*.json", use = "edit" },
  # { url = "*.py", use = "edit" },
  # { url = "*.toml", use = "edit" },
  { url = "*.sh",   use = "edit" },
  { url = "*.zsh",  use = "edit" },
  { url = "*.conf", use = "edit" },

  # fallback text rule 
  { mime = "text/*", use = "edit" }, 

   # media
  { mime = "image/*",           use = "image" },



]


