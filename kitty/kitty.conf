# kitty setup
#

# ----------------------------
# Font
# ----------------------------
font_family JetBrainsMono Nerd Font Mono
font_size 15.0

# Slightly nicer spacing
adjust_line_height 105%
adjust_column_width 100%


# ----------------------------
# Shell
# ----------------------------
#shell /bin/zsh


# ----------------------------
# Window
# ----------------------------
remember_window_size yes
initial_window_width 110c
initial_window_height 32c

window_padding_width 8

# Keep normal macOS window buttons/titlebar
hide_window_decorations no

# Confirm before closing? 0 = no confirm
confirm_os_window_close 0


# ----------------------------
# macOS behaviour
# ----------------------------
# macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_window_resizable yes

# Makes Cmd+click on links work nicely
mouse_map cmd+left click ungrabbed mouse_handle_click link


# ----------------------------
# Cursor
# ----------------------------
cursor_shape beam
cursor_blink_interval 0
cursor_beam_thickness 8


# ----------------------------
# Scrollback
# ----------------------------
scrollback_lines 10000
wheel_scroll_multiplier 3.0


# ----------------------------
# Bell
# ----------------------------
enable_audio_bell no
visual_bell_duration 0.0


# ----------------------------
# Tabs
# ----------------------------
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2


# ----------------------------
# Copy / paste
# ----------------------------
copy_on_select no
strip_trailing_spaces smart

# macOS-style shortcuts
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard


# ----------------------------
# Tabs and splits
# ----------------------------
map cmd+t new_tab
map cmd+w close_window

map cmd+d launch --location=vsplit
map cmd+shift+d launch --location=hsplit

map cmd+shift+right next_tab
map cmd+shift+left previous_tab


# ----------------------------
# Font size shortcuts
# ----------------------------
map cmd+plus change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0


# ----------------------------
# Theme
# Keep this at the bottom
# ----------------------------
# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME


